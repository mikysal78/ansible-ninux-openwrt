---
# tasks/dotconfig.yml - Assembla .config per target + estensioni

- name: Rimuovi .config esistenti
  ansible.builtin.shell: rm -rf {{ openwrt_src_dir }}/.config*
  changed_when: true

- name: Verifica esistenza config per il target
  ansible.builtin.stat:
    path: "{{ openwrt_ninux_src_dir }}/organizations/{{ openwrt_org }}/{{ openwrt_target }}.config"
  register: _target_config

- name: Fallisci se il config del target non esiste
  ansible.builtin.fail:
    msg: >
      Config non trovato: config/organizations/{{ openwrt_org }}/{{ openwrt_target }}.config
      Aggiungi il file nel repo oppure verifica openwrt_org e openwrt_target.
  when: not _target_config.stat.exists

- name: Copia config base del target
  ansible.builtin.copy:
    src: "{{ openwrt_ninux_src_dir }}/organizations/{{ openwrt_org }}/{{ openwrt_target }}.config"
    dest: "{{ openwrt_src_dir }}/.config"
    remote_src: true
    mode: "0644"

- name: Appendi estensione Captive Portal (coova-chilli)
  ansible.builtin.shell: cat {{ openwrt_ninux_src_dir }}/chilli.ext >> {{ openwrt_src_dir }}/.config
  when: openwrt_captive_portal | bool and openwrt_cp_engine == 'chilli'
  changed_when: true

- name: Appendi estensione Captive Portal (uspot)
  ansible.builtin.shell: cat {{ openwrt_ninux_src_dir }}/uspot.ext >> {{ openwrt_src_dir }}/.config
  when: openwrt_captive_portal | bool and openwrt_cp_engine == 'uspot'
  changed_when: true

- name: Appendi estensione ZeroTier
  ansible.builtin.shell: cat {{ openwrt_ninux_src_dir }}/zerotier.ext >> {{ openwrt_src_dir }}/.config
  when: _vpn in ['ZeroTier', 'Dual']
  changed_when: true

- name: Appendi estensione WireGuard
  ansible.builtin.shell: cat {{ openwrt_ninux_src_dir }}/wireguard.ext >> {{ openwrt_src_dir }}/.config
  when: _vpn in ['WireGuard', 'Dual']
  changed_when: true

- name: Appendi config base comune
  ansible.builtin.shell: cat {{ openwrt_ninux_src_dir }}/base.config >> {{ openwrt_src_dir }}/.config
  changed_when: true

# ccache si attiva SOLO da .config: la variabile d'ambiente CONFIG_CCACHE
# usata in passato non ha alcun effetto (build #65: cache a 0.0GB e
# "Stats updated: never" dopo mesi di build da ~30 minuti l'una).
- name: Abilita ccache nel .config (CONFIG_CCACHE)
  ansible.builtin.shell: |
    {
      echo 'CONFIG_CCACHE=y'
      echo 'CONFIG_CCACHE_DIR="{{ openwrt_ccache_dir }}"'
    } >> {{ openwrt_src_dir }}/.config
  when: _openwrt_use_ccache | default(openwrt_ccache_enabled) | bool
  changed_when: true

- name: Normalizza .config con make defconfig
  ansible.builtin.command:
    cmd: make defconfig
    chdir: "{{ openwrt_src_dir }}"
  changed_when: true
