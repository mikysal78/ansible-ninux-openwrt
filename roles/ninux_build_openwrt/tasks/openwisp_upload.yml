---
# tasks/openwisp_upload.yml
#
# Carica i firmware sysupgrade su OpenWISP Firmware Upgrader via REST API.
#
# Flusso:
#   1. Autenticazione → token Bearer
#   2. Recupera UUID organizzazione (se non definito, cerca per slug)
#   3. Cerca o crea Category (per org + device target)
#   4. Crea Build (versione + variante VPN/CP)
#   5. Carica ogni file sysupgrade come Image
#   6. (opzionale) Avvia batch upgrade

# ---- 1. Token ---------------------------------------------------
- name: "[OpenWISP] Imposta token"
  ansible.builtin.set_fact:
    _ow_token: "{{ _ow_token_global }}"
  no_log: true

# ---- 2. Risolvi UUID organizzazione ------------------------------
- name: "[OpenWISP] Cerca organizzazione per slug"
  ansible.builtin.uri:
    url: "{{ openwisp_url }}/api/v1/users/organization/?slug={{ openwisp_org_slug }}"
    method: GET
    headers:
      Authorization: "Bearer {{ _ow_token }}"
    status_code: 200
  register: _ow_orgs
  when: openwisp_org_id | string | length < 10

- name: "[OpenWISP] Risolvi UUID org da slug"
  ansible.builtin.set_fact:
    _ow_org_id: >-
      {{
        _ow_orgs.json.results[0].id
        if (_ow_orgs is not skipped and _ow_orgs.json.count > 0)
        else openwisp_org_id | string
      }}
  when: openwisp_org_id | string | length < 10

- name: "[OpenWISP] Usa UUID org da ninux.yml"
  ansible.builtin.set_fact:
    _ow_org_id: "{{ openwisp_org_id | string }}"
  when: openwisp_org_id | string | length >= 10

- name: "[OpenWISP] Verifica UUID org"
  ansible.builtin.assert:
    that:
      - _ow_org_id is defined
      - _ow_org_id | length >= 10
    fail_msg: >
      Impossibile determinare UUID organizzazione OpenWISP.
      Definisci openwisp_org_id in ninux.yml (cifrato con encrypt_string)
      oppure verifica che openwisp_org_slug='{{ openwisp_org_slug }}' esista.

# ---- 3. Cerca o crea Category ------------------------------------
- name: "[OpenWISP] Calcola nome category"
  ansible.builtin.set_fact:
    _ow_category_name: "Ninux {{ openwrt_org | capitalize }} - {{ openwrt_target }}"

- name: "[OpenWISP] Cerca category esistente"
  ansible.builtin.uri:
    url: "{{ openwisp_url }}/api/v1/firmware-upgrader/category/"
    method: GET
    headers:
      Authorization: "Bearer {{ _ow_token }}"
    status_code: 200
  register: _ow_categories

- name: "[OpenWISP] Filtra category per nome e org"
  ansible.builtin.set_fact:
    _ow_category: >-
      {{
        _ow_categories.json.results
        | selectattr('name', 'equalto', _ow_category_name)
        | selectattr('organization', 'equalto', _ow_org_id)
        | list | first | default({})
      }}

- name: "[OpenWISP] Crea category se non esiste"
  ansible.builtin.uri:
    url: "{{ openwisp_url }}/api/v1/firmware-upgrader/category/"
    method: POST
    headers:
      Authorization: "Bearer {{ _ow_token }}"
      Content-Type: "application/json"
    body_format: json
    body:
      name: "{{ _ow_category_name }}"
      organization: "{{ _ow_org_id }}"
    status_code: 201
  register: _ow_category_created
  when: _ow_category | length == 0

- name: "[OpenWISP] Imposta ID category"
  ansible.builtin.set_fact:
    _ow_category_id: >-
      {{
        _ow_category.id
        if _ow_category | length > 0
        else _ow_category_created.json.id
      }}

- name: "[OpenWISP] Category: {{ _ow_category_name }} ({{ _ow_category_id }})"
  ansible.builtin.debug:
    msg: "Category: {{ _ow_category_name }} → {{ _ow_category_id }}"

# ---- 4. Calcola nome build e crea Build --------------------------
- name: "[OpenWISP] Abbrevia nome VPN per limite 32 caratteri"
  ansible.builtin.set_fact:
    _ow_vpn_abbr: >-
      {{
        {'NONE': 'NO', 'ZeroTier': 'ZT', 'WireGuard': 'WG', 'Dual': 'DV'}
        [_vpn] | default(_vpn[:2])
      }}

- name: "[OpenWISP] Abbrevia motore Captive Portal"
  ansible.builtin.set_fact:
    _ow_cp_abbr: >-
      {{
        '' if not openwrt_captive_portal | bool
        else ('CP-' if openwrt_cp_engine == 'chilli' else 'US-')
      }}

- name: "[OpenWISP] Calcola versione build"
  ansible.builtin.set_fact:
    _ow_build_version: >-
      {{
        openwrt_version ~ '-' ~ openwrt_target[:12] ~ '-' ~
        _ow_cp_abbr ~ 'VPN-' ~ _ow_vpn_abbr
      }}

- name: "[OpenWISP] Cerca build esistente"
  ansible.builtin.uri:
    url: "{{ openwisp_url }}/api/v1/firmware-upgrader/build/?category={{ _ow_category_id }}"
    method: GET
    headers:
      Authorization: "Bearer {{ _ow_token }}"
    status_code: 200
  register: _ow_builds

- name: "[OpenWISP] Filtra build per versione"
  ansible.builtin.set_fact:
    _ow_existing_build: >-
      {{
        _ow_builds.json.results
        | selectattr('version', 'equalto', _ow_build_version)
        | list | first | default({})
      }}

# Stessa versione gia' presente: la build viene SOSTITUITA, non riusata.
# Riusarla lascerebbe online il firmware vecchio: l'upload di un'immagine
# duplicata risponde 400 e non rimpiazza il file gia' caricato.
- name: "[OpenWISP] Elimina la build con la stessa versione (verra' ricreata)"
  ansible.builtin.uri:
    url: "{{ openwisp_url }}/api/v1/firmware-upgrader/build/{{ _ow_existing_build.id }}/"
    method: DELETE
    headers:
      Authorization: "Bearer {{ _ow_token }}"
    status_code: [204, 404]
  when:
    - _ow_existing_build | length > 0
    - openwisp_replace_build | bool

- name: "[OpenWISP] Crea nuovo Build"
  ansible.builtin.uri:
    url: "{{ openwisp_url }}/api/v1/firmware-upgrader/build/"
    method: POST
    headers:
      Authorization: "Bearer {{ _ow_token }}"
      Content-Type: "application/json"
    body_format: json
    body:
      category: "{{ _ow_category_id }}"
      version: "{{ _ow_build_version }}"
      changelog: >-
        Build automatica Jenkins.
        Org={{ openwrt_org }} Target={{ openwrt_target }}
        VPN={{ _vpn }} CP={{ openwrt_cp_engine if openwrt_captive_portal | bool else 'NONE' }}
        Data={{ ansible_date_time.iso8601 }}
    status_code: 201
  register: _ow_build_created
  when: _ow_existing_build | length == 0 or openwisp_replace_build | bool

- name: "[OpenWISP] Imposta ID build"
  ansible.builtin.set_fact:
    _ow_build_id: >-
      {{
        _ow_existing_build.id
        if _ow_build_created is skipped
        else _ow_build_created.json.id
      }}

- name: "[OpenWISP] Build: {{ _ow_build_version }} ({{ _ow_build_id }})"
  ansible.builtin.debug:
    msg: >-
      Build: {{ _ow_build_version }} → {{ _ow_build_id }}
      {{ '(sostituita)' if (_ow_existing_build | length > 0 and openwisp_replace_build | bool)
         else ('(esistente)' if _ow_build_created is skipped else '(nuova)') }}

# ---- 5. Trova file sysupgrade ------------------------------------
- name: "[OpenWISP] Cerca file sysupgrade"
  ansible.builtin.find:
    paths: "{{ _artifact_local }}"
    patterns:
      - "*-sysupgrade.bin"
      - "*-sysupgrade.img.gz"
      - "*-sysupgrade.img"
      - "*squashfs-combined-efi.img.gz"
    file_type: file
  register: _ow_sysupgrade_files

- name: "[OpenWISP] File trovati per upload"
  ansible.builtin.debug:
    msg: "{{ _ow_sysupgrade_files.files | map(attribute='path') | map('basename') | list }}"
  when: _ow_sysupgrade_files.files | length > 0

# ---- 6. Carica immagini con curl (gestisce binario correttamente) --
- name: "[OpenWISP] Avviso se nessun sysupgrade trovato"
  ansible.builtin.debug:
    msg: >-
      ATTENZIONE: nessun file sysupgrade trovato in {{ _artifact_local }}.
      Upload saltato per questa variante.
  when: _ow_sysupgrade_files.files | length == 0

# L'output e' "corpo della risposta + ultima riga = http code" (-w "\n%{http_code}").
# Un 400 e' accettabile SOLO se e' un duplicato vero ("unique set" nel corpo):
# qualsiasi altro 400 (es. 'type' dell'immagine non riconosciuto dal controller)
# e' un upload NON riuscito e deve fallire, non finire nel conteggio dei
# "gia' presenti" — e' successo con zyxel_nwa50ax-pro: build nuova, 400,
# e il firmware non era mai arrivato sul controller.
- name: "[OpenWISP] Carica sysupgrade"
  ansible.builtin.command:
    cmd: >-
      curl -s -X POST
      -H "Authorization: Bearer {{ _ow_token }}"
      -F "file=@{{ item.path }}"
      -F "type={{ item.path | basename | regex_replace('^openwrt-', '') }}"
      -w "\n%{http_code}"
      {{ openwisp_url }}/api/v1/firmware-upgrader/build/{{ _ow_build_id }}/image/
  register: _ow_upload_result
  changed_when: _ow_upload_result.stdout_lines[-1] | int == 201
  failed_when: >-
    _ow_upload_result.stdout_lines[-1] | int not in [201, 400]
    or (_ow_upload_result.stdout_lines[-1] | int == 400
        and 'unique' not in _ow_upload_result.stdout | lower)
  loop: "{{ _ow_sysupgrade_files.files }}"
  loop_control:
    label: "{{ item.path | basename }}"
  when: _ow_sysupgrade_files.files | length > 0
  no_log: true

- name: "[OpenWISP] Riepilogo upload"
  ansible.builtin.debug:
    msg: >-
      Caricati {{ _ow_upload_result.results
        | map(attribute='stdout_lines') | map('last')
        | select('equalto', '201') | list | length }}
      sysupgrade su Build {{ _ow_build_id }}
      ({{ _ow_upload_result.results
        | map(attribute='stdout_lines') | map('last')
        | select('equalto', '400') | list | length }} già presenti)
  when: _ow_sysupgrade_files.files | length > 0

# ---- 6b. Retention: tieni solo le ultime N versioni OpenWrt -------
# Le build sono una per (versione x variante) dentro la category del device:
# la retention ragiona per VERSIONE OpenWrt, non per singola build, altrimenti
# cancellerebbe varianti VPN/CP della stessa compilazione.
- name: "[OpenWISP] Rileggi le build della category (retention)"
  ansible.builtin.uri:
    url: "{{ openwisp_url }}/api/v1/firmware-upgrader/build/?category={{ _ow_category_id }}&page_size=1000"
    method: GET
    headers:
      Authorization: "Bearer {{ _ow_token }}"
    status_code: 200
  register: _ow_builds_all
  when: openwisp_keep_versions | int > 0

- name: "[OpenWISP] Calcola le versioni da mantenere"
  ansible.builtin.set_fact:
    _ow_builds_desc: >-
      {{ _ow_builds_all.json.results | sort(attribute='created', reverse=true) }}
  when: openwisp_keep_versions | int > 0

# NB: niente regex_replace con backreference qui — dentro un `when:` la '\1'
# non viene interpretata e la condizione diverrebbe vera per TUTTE le build
# (cancellazione totale dello storico). split('-')[0] e' affidabile in entrambi
# i contesti: la versione build e' sempre "<openwrt_version>-<target>-...".
- name: "[OpenWISP] Ultime {{ openwisp_keep_versions }} versioni da tenere"
  ansible.builtin.set_fact:
    _ow_keep_versions: >-
      {{
        (_ow_builds_desc
         | map(attribute='version')
         | map('split', '-')
         | map('first')
         | list | unique)[:openwisp_keep_versions | int]
      }}
  when: openwisp_keep_versions | int > 0

- name: "[OpenWISP] Retention: {{ _ow_category_name }}"
  ansible.builtin.debug:
    msg: >-
      Versioni mantenute: {{ _ow_keep_versions | join(', ') }}
      ({{ _ow_builds_desc | length }} build nella category)
  when: openwisp_keep_versions | int > 0

- name: "[OpenWISP] Elimina le build delle versioni piu' vecchie"
  ansible.builtin.uri:
    url: "{{ openwisp_url }}/api/v1/firmware-upgrader/build/{{ item.id }}/"
    method: DELETE
    headers:
      Authorization: "Bearer {{ _ow_token }}"
    status_code: [204, 404]
  loop: "{{ _ow_builds_desc | default([]) }}"
  loop_control:
    label: "{{ item.version }}"
  when:
    - openwisp_keep_versions | int > 0
    - item.version.split('-')[0] not in _ow_keep_versions

# ---- 7. Batch upgrade (opzionale) --------------------------------
- name: "[OpenWISP] Preview device da aggiornare"
  ansible.builtin.uri:
    url: "{{ openwisp_url }}/api/v1/firmware-upgrader/build/{{ _ow_build_id }}/upgrade/"
    method: GET
    headers:
      Authorization: "Bearer {{ _ow_token }}"
    status_code: 200
  register: _ow_upgrade_preview
  when: openwisp_trigger_upgrade | bool

- name: "[OpenWISP] Device che verranno aggiornati: {{ _ow_upgrade_preview.json | length | default(0) }}"
  ansible.builtin.debug:
    msg: "{{ _ow_upgrade_preview.json | length }} device da aggiornare"
  when: openwisp_trigger_upgrade | bool

- name: "[OpenWISP] Avvia batch upgrade"
  ansible.builtin.uri:
    url: "{{ openwisp_url }}/api/v1/firmware-upgrader/build/{{ _ow_build_id }}/upgrade/"
    method: POST
    headers:
      Authorization: "Bearer {{ _ow_token }}"
      Content-Type: "application/json"
    body_format: json
    body: "{{ {} | combine({'group': openwisp_upgrade_group} if openwisp_upgrade_group else {}) }}"
    status_code: 200
  when:
    - openwisp_trigger_upgrade | bool
    - _ow_upgrade_preview.json | length > 0

- name: "[OpenWISP] Batch upgrade avviato"
  ansible.builtin.debug:
    msg: "Monitora su {{ openwisp_url }}/firmware-upgrader/batchupgradeoperation/"
  when:
    - openwisp_trigger_upgrade | bool
    - _ow_upgrade_preview.json | length > 0
