---
# tasks/feeds.yml - feeds.conf, update e install

- name: Scrivi feeds.conf
  ansible.builtin.shell: |
    set -e
    {
      {% for feed in openwrt_feeds %}
      echo "{{ feed }}"
      {% endfor %}
      sed '/telephony/d' feeds.conf.default
    } > feeds.conf
  args:
    chdir: "{{ openwrt_src_dir }}"
    executable: /bin/bash
  changed_when: true

- name: Update feeds
  ansible.builtin.command:
    cmd: ./scripts/feeds update -a -f
    chdir: "{{ openwrt_src_dir }}"
  changed_when: true

- name: Install feeds
  ansible.builtin.command:
    cmd: ./scripts/feeds install -a -f
    chdir: "{{ openwrt_src_dir }}"
  changed_when: true

- name: Rimuovi pacchetti broken
  ansible.builtin.file:
    path: "{{ openwrt_src_dir }}/{{ item }}"
    state: absent
  loop: "{{ openwrt_remove_packages }}"
