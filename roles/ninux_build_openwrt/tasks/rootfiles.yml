---
# tasks/rootfiles.yml - Prepara overlay root_files nel buildroot OpenWrt

# -----------------------------------------------------------------------------
# Risolvi configurazione openwisp-config per questa org
# -----------------------------------------------------------------------------

- name: Controlla se org è definita in openwisp_orgs (ninux.yml)
  ansible.builtin.set_fact:
    _openwisp_org_cfg: "{{ openwisp_orgs[openwrt_org] | default(None) }}"

- name: Imposta _openwisp_enabled (true solo se org configurata e shared_secret presente)
  ansible.builtin.set_fact:
    _openwisp_enabled: >-
      {{
        _openwisp_org_cfg is not none and
        _openwisp_org_cfg | length > 0 and
        _openwisp_org_cfg.shared_secret is defined and
        _openwisp_org_cfg.shared_secret | string | length > 0
      }}

- name: Avviso se org non configurata per openwisp (build continua senza openwisp-config)
  ansible.builtin.debug:
    msg: >
      ATTENZIONE: org '{{ openwrt_org }}' non trovata in openwisp_orgs (ninux.yml)
      oppure manca shared_secret. Il firmware sarà compilato SENZA /etc/config/openwisp.
      Per abilitare, aggiungi l'org in ninux.yml con controller_url, management_interface
      e shared_secret (cifrata con ansible-vault encrypt_string).
  when: not _openwisp_enabled | bool

# -----------------------------------------------------------------------------
# Overlay root_files
# -----------------------------------------------------------------------------

- name: Rimuovi overlay files esistente
  ansible.builtin.file:
    path: "{{ openwrt_src_dir }}/files"
    state: absent

- name: Crea directory uci-defaults per org
  ansible.builtin.file:
    path: "{{ openwrt_ninux_src_dir }}/root_files/{{ openwrt_org }}/etc/uci-defaults"
    state: directory
    mode: "0755"

- name: Crea directory etc/config per org (openwisp)
  ansible.builtin.file:
    path: "{{ openwrt_ninux_src_dir }}/root_files/{{ openwrt_org }}/etc/config"
    state: directory
    mode: "0755"
  when: _openwisp_enabled | bool

- name: Genera /etc/config/openwisp da template
  ansible.builtin.template:
    src: openwisp-config.j2
    dest: "{{ openwrt_ninux_src_dir }}/root_files/{{ openwrt_org }}/etc/config/openwisp"
    mode: "0600"
  when: _openwisp_enabled | bool
  vars:
    _openwisp_controller_url: "{{ openwisp_orgs[openwrt_org].controller_url }}"
    _openwisp_management_interface: "{{ openwisp_orgs[openwrt_org].management_interface }}"
    _openwisp_shared_secret: "{{ openwisp_orgs[openwrt_org].shared_secret }}"

- name: Scrivi uci-default 99-mesh (bridge br-cp autoip, comune ai motori CP)
  ansible.builtin.template:
    src: 99-mesh.j2
    dest: "{{ openwrt_ninux_src_dir }}/root_files/{{ openwrt_org }}/etc/uci-defaults/99-mesh"
    mode: "0755"
  when: openwrt_captive_portal | bool

- name: Rimuovi 99-mesh (Captive Portal disabilitato)
  ansible.builtin.file:
    path: "{{ openwrt_ninux_src_dir }}/root_files/{{ openwrt_org }}/etc/uci-defaults/99-mesh"
    state: absent
  when: not openwrt_captive_portal | bool

- name: Rimuovi 99-br-cp residuo (sostituito da 99-mesh)
  ansible.builtin.file:
    path: "{{ openwrt_ninux_src_dir }}/root_files/{{ openwrt_org }}/etc/uci-defaults/99-br-cp"
    state: absent

- name: Scrivi uci-default 99-uspot (Captive Portal uspot)
  ansible.builtin.template:
    src: 99-uspot.j2
    dest: "{{ openwrt_ninux_src_dir }}/root_files/{{ openwrt_org }}/etc/uci-defaults/99-uspot"
    mode: "0755"
  when: openwrt_captive_portal | bool and openwrt_cp_engine == 'uspot'

- name: Rimuovi 99-uspot (CP disabilitato o motore diverso da uspot)
  ansible.builtin.file:
    path: "{{ openwrt_ninux_src_dir }}/root_files/{{ openwrt_org }}/etc/uci-defaults/99-uspot"
    state: absent
  when: not (openwrt_captive_portal | bool and openwrt_cp_engine == 'uspot')

- name: Scrivi uci-default 99-zerotier (ZeroTier / DualVPN)
  ansible.builtin.template:
    src: 99-zerotier.j2
    dest: "{{ openwrt_ninux_src_dir }}/root_files/{{ openwrt_org }}/etc/uci-defaults/99-zerotier"
    mode: "0755"
  when: openwrt_vpn in ['ZeroTier', 'DualVPN']

- name: Rimuovi 99-zerotier (VPN diversa)
  ansible.builtin.file:
    path: "{{ openwrt_ninux_src_dir }}/root_files/{{ openwrt_org }}/etc/uci-defaults/99-zerotier"
    state: absent
  when: openwrt_vpn not in ['ZeroTier', 'DualVPN']

- name: Copia overlay root_files in openwrt/files/
  ansible.builtin.copy:
    src: "{{ openwrt_ninux_src_dir }}/root_files/{{ openwrt_org }}/"
    dest: "{{ openwrt_src_dir }}/files/"
    remote_src: true
    mode: preserve
