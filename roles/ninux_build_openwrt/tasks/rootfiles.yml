---
# tasks/rootfiles.yml - Prepara overlay root_files nel buildroot OpenWrt
#
# L'overlay viene costruito da zero in {{ openwrt_src_dir }}/files a ogni
# variante, partendo da una copia pulita di root_files/<org>/. Le scelte della
# variante (quale /etc/config tenere, quali uci-defaults generare) si applicano
# li' dentro.
#
# In passato le modifiche venivano fatte sulla copia di staging CONDIVISA
# (build/ninux-configs/root_files/<org>/), che sopravvive a tutte le varianti e
# a tutte le build. Finche' quella copia veniva rifatta dal repo prima di ogni
# variante il trucco reggeva; appena e' diventata unica per run, la prima
# variante senza captive portal ha cancellato /etc/config/uspot e la variante
# uspot successiva non l'ha piu' trovato — firmware prodotti senza quel file,
# senza un errore.
#
# Costruire l'overlay dalla sorgente a ogni variante toglie la dipendenza
# dall'ordine, e con essa i vari "rimuovi residuo di build precedenti" che quel
# modello richiedeva: la destinazione e' nuova ogni volta, un residuo non puo'
# esistere.

# -----------------------------------------------------------------------------
# Risolvi configurazione openwisp-config per questa org
# -----------------------------------------------------------------------------

- name: Controlla se org è definita in openwisp_orgs (ninux.yml)
  ansible.builtin.set_fact:
    _openwisp_org_cfg: "{{ openwisp_orgs[openwrt_org] | default(None) }}"

- name: Imposta _openwisp_enabled (true solo se org configurata e shared_secret presente)
  ansible.builtin.set_fact:
    _openwisp_enabled: >-
      {{
        _openwisp_org_cfg is not none and
        _openwisp_org_cfg | length > 0 and
        _openwisp_org_cfg.shared_secret is defined and
        _openwisp_org_cfg.shared_secret | string | length > 0
      }}

- name: Avviso se org non configurata per openwisp (build continua senza openwisp-config)
  ansible.builtin.debug:
    msg: >
      ATTENZIONE: org '{{ openwrt_org }}' non trovata in openwisp_orgs (ninux.yml)
      oppure manca shared_secret. Il firmware sarà compilato SENZA /etc/config/openwisp.
      Per abilitare, aggiungi l'org in ninux.yml con controller_url, management_interface
      e shared_secret (cifrata con ansible-vault encrypt_string).
  when: not _openwisp_enabled | bool

# -----------------------------------------------------------------------------
# Overlay: copia pulita, poi personalizzazione per variante
# -----------------------------------------------------------------------------

- name: Rimuovi overlay della variante precedente
  ansible.builtin.file:
    path: "{{ openwrt_src_dir }}/files"
    state: absent

- name: Copia root_files dell'org nell'overlay
  ansible.builtin.copy:
    src: "{{ openwrt_ninux_src_dir }}/root_files/{{ openwrt_org }}/"
    dest: "{{ openwrt_src_dir }}/files/"
    remote_src: true
    mode: preserve

- name: Crea le directory dell'overlay
  ansible.builtin.file:
    path: "{{ openwrt_src_dir }}/files/etc/{{ item }}"
    state: directory
    mode: "0755"
  loop:
    - config
    - uci-defaults

# -----------------------------------------------------------------------------
# openwisp-config
# -----------------------------------------------------------------------------

- name: Genera /etc/config/openwisp da template
  ansible.builtin.template:
    src: openwisp-config.j2
    dest: "{{ openwrt_src_dir }}/files/etc/config/openwisp"
    mode: "0600"
  when: _openwisp_enabled | bool
  vars:
    _openwisp_controller_url: "{{ openwisp_orgs[openwrt_org].controller_url }}"
    _openwisp_management_interface: "{{ openwisp_orgs[openwrt_org].management_interface }}"
    _openwisp_shared_secret: "{{ openwisp_orgs[openwrt_org].shared_secret }}"

# root_files/<org>/ puo' contenerne una copia committata nel repo (e' il caso
# dell'org di esempio): senza org configurata finirebbe nel firmware con
# controller e secret di qualcun altro.
- name: Rimuovi /etc/config/openwisp se l'org non è configurata
  ansible.builtin.file:
    path: "{{ openwrt_src_dir }}/files/etc/config/openwisp"
    state: absent
  when: not _openwisp_enabled | bool

# -----------------------------------------------------------------------------
# Captive Portal
#
# La configurazione del portale la spinge OpenWISP come template: nel firmware
# c'e' solo /etc/config/uspot vuoto, che il template sovrascrive al primo
# checkin. Nessun uci-default.
# -----------------------------------------------------------------------------

- name: Rimuovi /etc/config/uspot (Captive Portal disabilitato)
  ansible.builtin.file:
    path: "{{ openwrt_src_dir }}/files/etc/config/uspot"
    state: absent
  when: not (openwrt_captive_portal | bool and openwrt_cp_engine == 'uspot')

# -----------------------------------------------------------------------------
# VPN
# -----------------------------------------------------------------------------

- name: Scrivi uci-default 99-zerotier (ZeroTier / Dual)
  ansible.builtin.template:
    src: 99-zerotier.j2
    dest: "{{ openwrt_src_dir }}/files/etc/uci-defaults/99-zerotier"
    mode: "0755"
  when: _vpn in ['ZeroTier', 'Dual']

- name: Rimuovi /etc/config/zerotier (VPN senza ZeroTier)
  ansible.builtin.file:
    path: "{{ openwrt_src_dir }}/files/etc/config/zerotier"
    state: absent
  when: _vpn not in ['ZeroTier', 'Dual']

# -----------------------------------------------------------------------------
# Traccia il contenuto: e' l'unico punto in cui si vede cosa finira' davvero
# nel firmware di QUESTA variante.
# -----------------------------------------------------------------------------

- name: Elenca l'overlay prodotto
  ansible.builtin.find:
    paths: "{{ openwrt_src_dir }}/files"
    recurse: true
    file_type: file
  register: _overlay_files

- name: "Overlay: {{ openwrt_target }} VPN={{ _vpn }} CP={{ openwrt_cp_engine if openwrt_captive_portal | bool else 'NO' }}"
  ansible.builtin.debug:
    msg: >-
      {{ _overlay_files.files | map(attribute='path')
         | map('regex_replace', '^' ~ openwrt_src_dir ~ '/files/', '')
         | sort | list }}
