---
# tasks/artifacts.yml - Copia firmware in output/ e su NFS

- name: Calcola nome variante Captive Portal
  ansible.builtin.set_fact:
    _cp_flavor: >-
      {{
        'Standard' if not openwrt_captive_portal | bool
        else ('CaptivePortal' if openwrt_cp_engine == 'chilli'
              else 'CaptivePortal-' + openwrt_cp_engine)
      }}

- name: Calcola percorsi artefatti
  ansible.builtin.set_fact:
    _artifact_local: >-
      {{
        openwrt_output_dir + '/' + openwrt_version + '/' + openwrt_org + '/' +
        _cp_flavor + '/VPN-' + _vpn + '/' + openwrt_target
      }}
    _artifact_nfs: >-
      {{
        openwrt_nfs_dir + '/' + openwrt_version + '/' + openwrt_org + '/' +
        _cp_flavor + '/VPN-' + _vpn + '/' + openwrt_target
      }}

- name: Debug percorsi
  ansible.builtin.debug:
    msg:
      - "output_dir  : {{ openwrt_output_dir }}"
      - "local dest  : {{ _artifact_local }}"
      - "nfs dest    : {{ _artifact_nfs }}"
      - "src bin/    : {{ openwrt_src_dir }}/bin/targets"

- name: Crea directory destinazione locale
  ansible.builtin.file:
    path: "{{ _artifact_local }}"
    state: directory
    mode: "0755"

- name: Crea directory destinazione NFS
  ansible.builtin.file:
    path: "{{ _artifact_nfs }}"
    state: directory
    mode: "0755"
  # NFS: ignora errori di permessi (gestiti lato server)
  failed_when: false

- name: Verifica presenza file firmware in bin/targets
  ansible.builtin.find:
    paths: "{{ openwrt_src_dir }}/bin/targets"
    patterns:
      - "*-sysupgrade.bin"
      - "*-factory.bin"
      - "*.img.gz"
      - "*.img"
    recurse: true
    file_type: file
  register: _firmware_found

- name: Fallisci se nessun firmware trovato
  ansible.builtin.fail:
    msg: >
      Nessun firmware trovato in {{ openwrt_src_dir }}/bin/targets
      La build potrebbe essere fallita silenziosamente.
  when: _firmware_found.files | length == 0

- name: "Firmware trovati: {{ _firmware_found.files | length }} file"
  ansible.builtin.debug:
    msg: "{{ _firmware_found.files | map(attribute='path') | map('basename') | list }}"

- name: Copia firmware in output/ (locale)
  ansible.builtin.shell: |
    set -e
    find {{ openwrt_src_dir }}/bin/targets -type f \( \
      -name "*-sysupgrade.bin"  \
      -o -name "*-factory.bin"  \
      -o -name "*.img.gz"       \
      -o -name "*.img"          \
      -o -name "sha256sums"     \
      -o -name "config.buildinfo"  \
      -o -name "feeds.buildinfo"   \
      -o -name "version.buildinfo" \
    \) \
    ! -path "*/packages/*"          \
    ! -path "*/kmods/*"             \
    ! -path "*/supplementary-files/*" \
    -exec cp -v {} {{ _artifact_local }}/ \;
  register: _copy_local
  changed_when: true

- name: Copia firmware su NFS
  ansible.builtin.shell: |
    find {{ openwrt_src_dir }}/bin/targets -type f \( \
      -name "*-sysupgrade.bin"  \
      -o -name "*-factory.bin"  \
      -o -name "*.img.gz"       \
      -o -name "*.img"          \
      -o -name "sha256sums"     \
      -o -name "config.buildinfo"  \
      -o -name "feeds.buildinfo"   \
      -o -name "version.buildinfo" \
    \) \
    ! -path "*/packages/*"          \
    ! -path "*/kmods/*"             \
    ! -path "*/supplementary-files/*" \
    -exec cp -v {} {{ _artifact_nfs }}/ \;
  changed_when: true
  # NFS potrebbe non essere montato - non blocca la build
  failed_when: false

- name: Pulisci bin/ dopo la copia
  ansible.builtin.file:
    path: "{{ openwrt_src_dir }}/bin"
    state: "{{ item }}"
    mode: "0755"
  loop: [absent, directory]

- name: Verifica file copiati in output/
  ansible.builtin.find:
    paths: "{{ _artifact_local }}"
    file_type: file
  register: _copied_files

- name: Riepilogo
  ansible.builtin.debug:
    msg:
      - "Locale : {{ _artifact_local }} ({{ _copied_files.files | length }} file)"
      - "NFS    : {{ _artifact_nfs }}"
      - "File   : {{ _copied_files.files | map(attribute='path') | map('basename') | list }}"

# Upload OpenWISP (opzionale)
- name: "[OpenWISP] Imposta token da org '{{ openwrt_org }}'"
  ansible.builtin.set_fact:
    _ow_token_global: "{{ openwisp_orgs[openwrt_org].api_token | string }}"
  no_log: true
  when:
    - openwisp_upload_enabled | bool
    - openwisp_orgs[openwrt_org] is defined
    - openwisp_orgs[openwrt_org].api_token is defined

- name: "[OpenWISP] Avviso se api_token non configurato per org '{{ openwrt_org }}'"
  ansible.builtin.debug:
    msg: >-
      ATTENZIONE: api_token non definito per org '{{ openwrt_org }}' in ninux.yml.
      Upload OpenWISP saltato. Aggiungi api_token sotto openwisp_orgs.{{ openwrt_org }}.
  when:
    - openwisp_upload_enabled | bool
    - (openwisp_orgs[openwrt_org] is not defined or
       openwisp_orgs[openwrt_org].api_token is not defined)

# L'upload NON deve buttare via la compilazione: se il controller e' irraggiungibile
# (e' gia' successo: server giu', errore "No route to host") un fallimento qui
# faceva fallire l'intera pipeline DOPO la build, saltando archiviazione e release
# GitHub. Il firmware era buono e veniva perso.
# Qui l'errore viene catturato, lasciato scritto in un file di segnalazione, e la
# build prosegue: il Jenkinsfile legge quel file e marca la build UNSTABLE.
# Con openwisp_upload_fatal: true si torna al comportamento di prima.
- name: Upload firmware su OpenWISP Firmware Upgrader
  when:
    - openwisp_upload_enabled | bool
    - _ow_token_global is defined
  block:
    - name: Esegui l'upload su OpenWISP
      ansible.builtin.include_tasks: openwisp_upload.yml

  rescue:
    # Il corpo della risposta HTTP non contiene il token (che sta solo nella
    # riga di comando, coperta da no_log): si puo' mostrare in chiaro.
    - name: "[OpenWISP] Componi il dettaglio dell'errore"
      ansible.builtin.set_fact:
        _ow_fail_detail: >-
          {{
            (_ow_upload_result.results | default([])
             | selectattr('failed', 'defined') | selectattr('failed')
             | map(attribute='stdout') | map('default', '(nessuna risposta)')
             | map('truncate', 200) | list | join(' | '))
            or (ansible_failed_task.name | default('?') ~ ': ' ~
                (ansible_failed_result.msg | default('errore sconosciuto') | truncate(200)))
          }}

    - name: "[OpenWISP] Risposte del controller per i file rifiutati"
      ansible.builtin.debug:
        msg: >-
          {{ item.item.path | basename }} → HTTP
          {{ item.stdout_lines | default(['?']) | last }} —
          {{ (item.stdout_lines | default(['(nessuna risposta)']))[:-1] | join(' ') | truncate(400) }}
      loop: "{{ _ow_upload_result.results | default([]) }}"
      loop_control:
        label: "{{ item.item.path | default('?') | basename }}"
      when: item.failed | default(false)

    - name: "[OpenWISP] Upload fallito: registra la variante e prosegui"
      ansible.builtin.lineinfile:
        path: "{{ openwrt_output_dir }}/.openwisp-upload-failed"
        line: >-
          {{ openwrt_org }}/{{ openwrt_target }} VPN={{ _vpn }}
          CP={{ openwrt_cp_engine if openwrt_captive_portal | bool else 'NONE' }}
          — {{ _ow_fail_detail }}
        create: true
        mode: "0644"

    - name: "[OpenWISP] Avviso: firmware NON caricato sul controller"
      ansible.builtin.debug:
        msg: >-
          ATTENZIONE: upload su {{ openwisp_url }} fallito per
          {{ openwrt_target }} VPN={{ _vpn }}. Il firmware e' stato comunque
          compilato e archiviato: va ricaricato quando il controller torna
          raggiungibile. Dettaglio: {{ _ow_fail_detail }}

    - name: "[OpenWISP] Fallisci comunque (openwisp_upload_fatal: true)"
      ansible.builtin.fail:
        msg: "Upload OpenWISP fallito e openwisp_upload_fatal e' true."
      when: openwisp_upload_fatal | default(false) | bool
