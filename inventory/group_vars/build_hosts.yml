---
# inventory/group_vars/build_hosts.yml
#
# Carica la configurazione centralizzata da config/build.yml
# NON modificare questo file - modifica config/build.yml

# Trick per caricare config/build.yml come variabili di gruppo:
# il file viene incluso tramite vars_files nei playbook.
# Le variabili definite in config/build.yml sovrascrivono i defaults del ruolo.
#
# Nota: group_vars non supporta include_vars nativamente,
# quindi le variabili chiave sono ridefinite qui per riferimento.
# Il file autorevole rimane config/build.yml (letto dai playbook con vars_files).

