---
# =============================================================================
# config/build.yml  —  Configurazione centralizzata del sistema di build
#
# Questo è IL file da modificare per personalizzare il comportamento
# del sistema. Tutte le variabili definite qui sovrascrivono i defaults
# del ruolo (roles/ninux_build_openwrt/defaults/main.yml).
#
# Viene letto automaticamente da tutti i playbook tramite group_vars.
# Per i segreti (password OpenWISP) usa ninux.yml (encrypt_string inline).
# =============================================================================

# -----------------------------------------------------------------------------
# OPENWRT - Versione e organizzazione
# -----------------------------------------------------------------------------

# Tag OpenWrt da compilare (es. v25.12.5, v24.10.0)
openwrt_version: "v25.12.5"

# Organizzazione Ninux - corrisponde a config/organizations/<org>/
openwrt_org: "basilicata"

# Org di solo esempio: non compilabili (i loro file servono da template).
# Una build su queste org fallisce subito con un messaggio esplicativo.
openwrt_example_orgs:
  - "default"

# Varianti VPN da compilare per ogni device
# Possibili valori: NONE, ZeroTier, WireGuard, Dual
openwrt_vpn_variants:
  - "NONE"
  - "ZeroTier"
  - "WireGuard"
  - "Dual"

# Compila anche le varianti con Captive Portal (una build in più per motore CP)
openwrt_cp_variants: true

# Motori Captive Portal — una build separata per ognuno.
# Oggi ne esiste uno solo (uspot); la lista resta perche' la matrice di
# build e i nomi degli artefatti sono gia' parametrici sul motore.
openwrt_cp_engines:
  - "uspot"

# -----------------------------------------------------------------------------
# PERCORSI
# -----------------------------------------------------------------------------

# Tutto relativo alla workdir del repo (funziona con Jenkins e build locali)
openwrt_work_dir: "{{ playbook_dir }}/.."

# Directory di build (sorgenti OpenWrt, feeds, oggetti compilati)
openwrt_build_basedir: "{{ openwrt_work_dir }}/build"

# Directory output firmware (file finali .bin, sha256sums, ecc.)
openwrt_output_dir: "{{ openwrt_work_dir }}/output"

# Mount NFS dove copiare i firmware completi (bin/targets/ intero)
openwrt_nfs_dir: "/mnt/nfs-firmware"

# Directory config locale (dentro il repo - non modificare)
openwrt_config_local_path: "{{ openwrt_work_dir }}/config"
openwrt_ninux_src_dir: "{{ openwrt_build_basedir }}/ninux-configs"
openwrt_src_dir: "{{ openwrt_build_basedir }}/openwrt"

# -----------------------------------------------------------------------------
# PERFORMANCE - Compilazione
# -----------------------------------------------------------------------------

# Repository upstream OpenWrt
openwrt_upstream_repo: "https://github.com/openwrt/openwrt.git"

# Numero di job make paralleli
# 0 = automatico (nproc + extra), consigliato
# Es. con 12 CPU -> 12 + 2 = 14 job
openwrt_make_jobs: 0
openwrt_make_jobs_extra: 2

# -----------------------------------------------------------------------------
# PERFORMANCE - ccache
# -----------------------------------------------------------------------------

# Abilita ccache (riduce del 70% il tempo dalla seconda build)
openwrt_ccache_enabled: true

# Percorso ccache FUORI dal workspace Jenkins:
# - sopravvive tra i job (riuso della cache)
# - su Proxmox LXC: usa una directory su storage persistente
openwrt_ccache_dir: "/var/cache/openwrt-ccache"

# Dimensione massima ccache (con 6 device e 4 varianti VPN: ~15-20GB)
openwrt_ccache_maxsize: "20G"

# -----------------------------------------------------------------------------
# PERFORMANCE - ImageBuilder
#
# Percorso normale: ogni variante (device x VPN x Captive Portal) e' una
# compilazione completa da sorgente. Le varianti dello stesso device pero'
# differiscono solo per QUALI pacchetti sono installati, non per come sono
# compilati: ricompilare toolchain, kernel e pacchetti ogni volta e' lavoro
# buttato.
#
# Percorso ImageBuilder: per ogni device si compila UNA volta un "seed" che e'
# il superset delle varianti (tutte le VPN, tutti i motori CP). Il seed produce
# un ImageBuilder standalone con dentro tutti i pacchetti compilati (base.config
# ha gia' CONFIG_IB=y e CONFIG_IB_STANDALONE=y). Le varianti vengono poi
# assemblate da quell'ImageBuilder in un paio di minuti l'una.
#
# Con l'attuale matrice basilicata (2 VPN x 2 CP = 4 varianti/device) si passa
# da 4 compilazioni complete a 1 + 4 assemblaggi.
#
# I nomi dei file prodotti sono identici a quelli del percorso normale:
# release GitHub e upload OpenWISP non cambiano.
openwrt_use_imagebuilder: false

# Dove conservare gli ImageBuilder estratti, per versione/org/device/gruppo.
# Sopravvive tra le build: un device gia' "seedato" riparte dagli assemblaggi.
openwrt_ib_cache_dir: "{{ openwrt_build_basedir }}/imagebuilder"

# Ricompila il seed anche se in cache (dopo modifiche a base.config o ai feed)
openwrt_ib_force_seed: false

# NB: un solo seed per device presuppone che tutti i motori in
# openwrt_cp_engines siano compilabili insieme. Vale con uspot, unico motore
# rimasto. Un motore che imponga scelte di compilazione incompatibili (com'era
# coova-chilli, che richiedeva firewall3 + iptables legacy contro firewall4 +
# nftables) richiederebbe di nuovo un seed separato per motore.

# -----------------------------------------------------------------------------
# PERFORMANCE - tmpfs (RAM disk per directory temporanee build)
# -----------------------------------------------------------------------------

# Monta tmp/ su RAM disk: risparmia ~30-40% del tempo di build su I/O
# Il container ha 24GB RAM, 8G per tmpfs è sicuro
openwrt_tmpfs_enabled: true
openwrt_tmpfs_size: "8G"
openwrt_tmpfs_path: "/mnt/openwrt-tmpfs"

# -----------------------------------------------------------------------------
# PULIZIA
# -----------------------------------------------------------------------------

# Rimuovi staging_dir/build_dir dopo ogni device (risparmio disco ~5-10GB)
# Vengono ricostruiti da ccache in ~2 minuti alla build successiva
openwrt_cleanup_after_build: true

# Rimuovi i sorgenti OpenWrt al termine di tutte le build
# false = più veloce alla build successiva (riscarca solo i delta)
# true  = libera ~500MB ma la prossima build deve riscaricare tutto
openwrt_cleanup_sources: false

# -----------------------------------------------------------------------------
# TARGET con clean build forzato (bug noti OpenWrt)
# -----------------------------------------------------------------------------

openwrt_clean_build_targets:
  - "lamobo_R1"
  - "tplink_c2600"

# -----------------------------------------------------------------------------
# FEEDS aggiuntivi
# -----------------------------------------------------------------------------

openwrt_feeds:
  - "src-git openwisp_config https://github.com/openwisp/openwisp-config.git"
  - "src-git openwisp_monitoring https://github.com/openwisp/openwrt-openwisp-monitoring.git"
  - "src-git zerotier https://github.com/mwarning/zerotier-openwrt.git"

# Pacchetti da rimuovere dopo l'installazione dei feed (bug noti)
openwrt_remove_packages:
  - "package/feeds/luci/luci-app-apinger"

# -----------------------------------------------------------------------------
# OPENWISP Firmware Upgrader
# -----------------------------------------------------------------------------

# Abilita upload automatico su OpenWISP dopo la build
# Le credenziali vanno in ninux.yml (encrypt_string inline)
openwisp_upload_enabled: false

# URL base dell'istanza OpenWISP (es. https://openwisp.example.org)
openwisp_url: ""

# Slug e UUID dell'organizzazione OpenWISP
# Lo slug di solito coincide con openwrt_org
openwisp_org_slug: "{{ openwrt_org }}"
openwisp_org_id: ""

# Nome della category firmware in OpenWISP (creata se non esiste)
openwisp_category_name: "Ninux {{ openwrt_org | capitalize }} - {{ openwrt_target }}"

# Un upload fallito non fa fallire la build (il firmware resta archiviato):
# la variante non caricata finisce in output/.openwisp-upload-failed e Jenkins
# marca la build UNSTABLE. true = fallisce tutta la pipeline, come prima.
openwisp_upload_fatal: false

# Sostituisci la build se la versione esiste gia' su OpenWISP
openwisp_replace_build: true

# Retention: versioni OpenWrt da tenere per device (0 = disattivata)
openwisp_keep_versions: 3

# Avvia batch upgrade su tutti i device dopo l'upload
openwisp_trigger_upgrade: false

# Limita upgrade a un device group specifico (UUID OpenWISP)
# Lascia vuoto per aggiornare tutti i device dell'org
openwisp_upgrade_group: ""

# Mappa target OpenWrt -> "type" immagine atteso da OpenWISP.
#
# OpenWISP NON abbina il device al firmware guardando il nome del file caricato,
# ma il campo `type` che passiamo in upload: deve coincidere ESATTAMENTE con una
# chiave della hardware map ufficiale di OpenWISP (OPENWRT_FIRMWARE_IMAGE_MAP in
# openwisp_firmware_upgrader/hardware.py). Se il type non è tra quelli noti, il
# controller risponde 400 e il firmware non viene mai memorizzato.
#
# I nomi qui NON seguono il nome file prodotto da OpenWrt (che include versione e
# nome profilo moderno, es. "openwrt-25.12.5-ramips-mt76x8-glinet_gl-mt300n-v2-..."):
# usano lo schema storico della mappa OpenWISP (niente versione, profilo legacy).
#
# Un target NON presente in questa mappa viene saltato in upload e annotato in
# output/.openwisp-unsupported (la build prosegue). Per caricarlo comunque, aggiungi
# la sua voce qui E configura OPENWISP_CUSTOM_OPENWRT_IMAGES sul controller.
openwisp_image_type_map:
  glinet_gl-mt300n-v2: "ramips-mt76x8-gl-mt300n-v2-squashfs-sysupgrade.bin"
  linksys_wrt3200acm: "mvebu-cortexa9-linksys_wrt3200acm-squashfs-sysupgrade.img"
  x86_64: "x86-64-generic-squashfs-combined-efi.img.gz"
  # Non presenti nella hardware map UFFICIALE di OpenWISP: abilitati tramite
  # OPENWISP_CUSTOM_OPENWRT_IMAGES sul controller (playbook openwisp2). I `type`
  # qui devono restare identici a quelli dichiarati là, altrimenti l'upload dà 400.
  totolink_X5000R: "ramips-mt7621-totolink_x5000r-squashfs-sysupgrade.bin"
  tplink_c2600: "ipq806x-generic-tplink_c2600-squashfs-sysupgrade.bin"
  zyxel_nwa50ax-pro: "mediatek-filogic-zyxel_nwa50ax-pro-squashfs-sysupgrade.bin"

# -----------------------------------------------------------------------------
# OPENWISP-CONFIG (agente sul firmware)
# La configurazione per org (controller_url, management_interface) è in:
#   ninux.yml (sezione openwisp_orgs)
# Le shared_secret sono in:
#   ninux.yml →  ninux.yml (encrypt_string inline)
# Se un'org non è definita in ninux.yml o manca la secret nel vault,
# la build continua senza generare /etc/config/openwisp.
# -----------------------------------------------------------------------------

# -----------------------------------------------------------------------------
# DIPENDENZE DI BUILD (apt)
# Modificare solo se si usa una distribuzione non standard
# -----------------------------------------------------------------------------

openwrt_build_deps:
  - build-essential
  - ccache
  - time
  - git
  - subversion
  - g++
  - bash
  - make
  - libssl-dev
  - patch
  - libncurses-dev
  - zlib1g-dev
  - gawk
  - flex
  - gettext
  - wget
  - unzip
  - xz-utils
  - python3
  - python3-distutils-extra
  - rsync
  - curl
  - libsnmp-dev
  - liblzma-dev
  - libpam0g-dev
  - cpio
  # scompattare il tarball dell'ImageBuilder (.tar.zst)
  - zstd
