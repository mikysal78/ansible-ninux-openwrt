# Configurazione bird2 gestita da OpenWISP - non modificare a mano sul router.
# Deriva dalla configurazione Babel NINUX, con la VPN spostata da ZeroTier
# (owzt0d3e97) alla VXLAN su WireGuard (vxlan*).

log syslog all;
log stderr all;
router id from "br-lan";

# Sync bird routing table with kernel
protocol kernel kernel4 {
    description "Kernel protocol for IPv4";
    scan time 20;
    learn yes;
    metric 50;
    merge paths yes;
    ipv4 {
        table master4;
        export filter {
            if (proto = "lan") then reject;
            accept;
        };
        import filter {
            if (net = 0.0.0.0/0) && (ifname != "br-mesh") then accept;
            reject;
        };
    };
};

protocol kernel kernel6 {
    description "Kernel protocol for IPv6";
    scan time 20;
    learn yes;
    metric 300;
    merge paths yes;
    ipv6 {
        table master6;
        export filter {
            if (proto = "lan") then reject;
            accept;
        };
        import filter {
            if (net = ::/0) then accept;
            reject;
        };
    };
};

protocol device {
    description "Device protocol";
    scan time 10;
};

protocol direct lan {
    description "LAN protocol";
    ipv4;
    ipv6;
    interface "br-lan";
    check link no;
}

protocol babel ninux {
    description "Babel protocol for NINUX network";
    ipv4 {
        export where (source = RTS_DEVICE) || (source = RTS_BABEL) || (net != 0.0.0.0/0);
        import where (net != 0.0.0.0/0);
    };
    ipv6 {
        export where (source = RTS_DEVICE) || (source = RTS_BABEL) || (net != ::/0);
        import where (net != ::/0);
    };
    # VPN OpenWISP: VXLAN over WireGuard (sostituisce owzt0d3e97).
    # Il pattern copre sia "vxlan1" sia l'eventuale nome assegnato da netifd.
    interface "vxlan*" {
        check link yes;
        rxcost 600;
    };
    interface "br-lan" {
        check link yes;
        rxcost 600;
    };
    interface "br-mesh" {
        type wireless;
        check link yes;
    };
}

protocol bfd {
    interface "br-mesh" {
        min rx interval 20 ms;
        min tx interval 50 ms;
        idle tx interval 300 ms;
    };
}

# Rotta di default appresa dalla mesh vicina (per i router senza uplink
# proprio). OpenWISP non fa da gateway: il default NON passa mai dalla VPN.
protocol ospf v3 internet_v4 {
    ipv4 {
        import filter {
            if (net = 0.0.0.0/0) && (ifname = "br-mesh") then accept;
            reject;
        };
        export filter {
            if (source = RTS_INHERIT) && (net = 0.0.0.0/0) then accept;
            if (source = RTS_OSPF) && (net = 0.0.0.0/0) then accept;
            reject;
        };
    };
    ecmp yes;
    merge external yes;
    area 0 {
        interface "br-mesh" {
            type broadcast;
            check link yes;
            bfd no;
        };
        interface "wan" {
            check link yes;
            stub yes;
        };
    };
};
