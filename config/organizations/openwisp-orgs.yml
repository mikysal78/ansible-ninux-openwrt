---
# config/organizations/openwisp-orgs.yml
#
# Configurazione openwisp-config per organizzazione.
# Questo file è in chiaro nel repo — NON inserire secret qui.
# Le shared_secret vanno in inventory/vault.yml (cifrato con ansible-vault),
# nella chiave vault_openwisp_secrets.<org>.
#
# Se un'org non è definita qui, la build SALTA la generazione di
# /etc/config/openwisp e il device non avrà openwisp-config configurato.
#
# Campi per org:
#   controller_url       - URL del controller OpenWISP
#   management_interface - Interfaccia di management OpenWISP (es. owzXXXXX)
#
# Esempio per aggiungere una nuova org:
#   nuovaorg:
#     controller_url: "https://controller.nnxx.ninux.org"
#     management_interface: "owzNUOVA"
#   Poi in inventory/vault.yml aggiungere:
#     vault_openwisp_secrets:
#       nuovaorg: "SecretNuovaOrg"

openwisp_orgs:
  basilicata:
    controller_url: "https://controller.nnxx.ninux.org"
    management_interface: "owz12345"
